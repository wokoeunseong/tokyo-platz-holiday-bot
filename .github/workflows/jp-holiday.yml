name: Japan Holiday Check

on:
  schedule:
    - cron: '0 17 * * *'
  workflow_dispatch:

jobs:
  holiday-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run holiday check
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: python scripts/jp_holiday_check.py
